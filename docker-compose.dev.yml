services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edupulse
      POSTGRES_USER: edupulse
      POSTGRES_PASSWORD: edupulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edupulse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
